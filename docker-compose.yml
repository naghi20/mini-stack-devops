services:
  # 1. Reverse Proxy (Self-Healing Router)
  proxy:
    image: nginx:alpine
    container_name: local-proxy
    restart: unless-stopped  # <--- Component 1: Auto-Restart Policy
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app
      - jenkins
    healthcheck:            # <--- Component 2: Internal Health Verification
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

  # 2. Automation Server
  jenkins:
    image: jenkins/jenkins:lts-alpine
    container_name: local-jenkins
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m -Djenkins.install.runSetupWizard=true
      - JENKINS_OPTS=--prefix=/jenkins
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/jenkins/login"]
      interval: 45s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 800M

  # 3. Sample PHP Web Application
  app:
    image: php:8.2-fpm-alpine
    container_name: local-app
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # 4. Lightweight SQL Database
  database:
    image: mariadb:lts
    container_name: local-db
    restart: unless-stopped
    command: --performance_schema=OFF --innodb_buffer_pool_size=32M
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sample_db
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  # 5. Resource Metrics Collector
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: local-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 45M

  # 6. Time-Series Metrics Database
  prometheus:
    image: prom/prometheus:v2.51.1
    container_name: local-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  jenkins-data:
  db-data:
  prometheus-data:
