version: '3.8'

services:
  # 1. Reverse Proxy (Consumes ~20MB RAM)
  proxy:
    image: nginx:alpine
    container_name: local-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app
      - jenkins
    deploy:
      resources:
        limits:
          memory: 64M

  # 2. Automation Server (Consumes ~700MB RAM)
  jenkins:
    image: jenkins/jenkins:lts-alpine
    container_name: local-jenkins
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m -Djenkins.install.runSetupWizard=true
      - JENKINS_OPTS=--prefix=/jenkins
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 800M

  # 3. Sample PHP Web Application (Consumes ~30MB RAM)
  app:
    image: php:8.2-fpm-alpine
    container_name: local-app
    volumes:
      - ./app:/var/www/html
    depends_on:
      - database
    deploy:
      resources:
        limits:
          memory: 128M

  # 4. Lightweight SQL Database (Now Persistent!)
  database:
    image: mariadb:lts
    container_name: local-db
    command: --performance_schema=OFF --innodb_buffer_pool_size=32M
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sample_db
    volumes:
      - db-data:/var/lib/mysql # <--- Added to save database files
    deploy:
      resources:
        limits:
          memory: 300M
  # 5. Resource Metrics Collector (Consumes ~30MB RAM)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: local-cadvisor
    ports:
      - "8080:8080" 
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 45M

  # 6. Time-Series Metrics Database (Consumes ~40MB RAM)
  prometheus:
    image: prom/prometheus:v2.51.1
    container_name: local-prometheus
    ports:
      - "9090:9090" 
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1d' # Save storage space by keeping only 1 day of metrics history
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor
    deploy:
      resources:
        limits:
          memory: 64M


# Declares the permanent storage buckets managed by Docker
volumes:
  jenkins-data:
  db-data:
  prometheus-data:
